version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hive-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: metastore_db
      MYSQL_USER: hive
      MYSQL_PASSWORD: hivepassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  hadoop-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.1.3-java8
    container_name: hadoop-namenode
    restart: always
    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:8020
      - HDFS_CONF_dfs_replication=1
    ports:
      - "9870:9870"
      - "8020:8020"
    volumes:
      - hadoop_namenode_data:/hadoop/dfs/name

  hadoop-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.1.3-java8
    container_name: hadoop-datanode
    restart: always
    environment:
      - SERVICE_PRECONDITION=hadoop-namenode:8020
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:8020
      - HDFS_CONF_dfs_replication=1
    ports:
      - "9864:9864"
    volumes:
      - hadoop_datanode_data:/hadoop/dfs/data
    depends_on:
      - hadoop-namenode

  hive-metastore:
    build: ./hive
    container_name: hive-metastore
    restart: always
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: mysql
    volumes:
      - ./hive/hive-site.xml:/opt/hive/conf/hive-site.xml
    depends_on:
      mysql:
        condition: service_healthy
      hadoop-namenode:
        condition: service_started
      hadoop-datanode:
        condition: service_started

  hive-server:
    build: ./hive
    container_name: hive-server
    restart: always
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      SERVICE_NAME: hiveserver2
      DB_DRIVER: mysql
      IS_RESUME: "true"
    volumes:
      - ./hive/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./init-hive.sql:/opt/init-hive.sql
    depends_on:
      hive-metastore:
        condition: service_started
      hadoop-namenode:
        condition: service_started
      hadoop-datanode:
        condition: service_started

volumes:
  mysql_data:
  hadoop_namenode_data:
  hadoop_datanode_data:
