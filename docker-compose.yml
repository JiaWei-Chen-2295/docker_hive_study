version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hive-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: metastore_db
      MYSQL_USER: hive
      MYSQL_PASSWORD: hivepassword
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  hadoop-namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.1.3-java8
    container_name: hadoop-namenode
    restart: unless-stopped
    environment:
      - CLUSTER_NAME=test
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:8020
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_permissions_enabled=false
      - HDFS_CONF_dfs_webhdfs_enabled=true
      - HDFS_CONF_dfs_client_use_datanode_hostname=true
    ports:
      - "9870:9870"
      - "8020:8020"
    volumes:
      - hadoop_namenode_data:/hadoop/dfs/name

  hadoop-datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.1.3-java8
    container_name: hadoop-datanode
    restart: unless-stopped
    environment:
      - SERVICE_PRECONDITION=hadoop-namenode:8020
      - CORE_CONF_fs_defaultFS=hdfs://hadoop-namenode:8020
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_datanode_hostname=hadoop-datanode
      - HDFS_CONF_dfs_datanode_http_address=0.0.0.0:9864
      - HDFS_CONF_dfs_datanode_address=0.0.0.0:9866
      - HDFS_CONF_dfs_datanode_ipc_address=0.0.0.0:9867
      - HDFS_CONF_dfs_client_use_datanode_hostname=true
    ports:
      - "9864:9864"
      - "9866:9866"
      - "9867:9867"
    volumes:
      - hadoop_datanode_data:/hadoop/dfs/data
    depends_on:
      - hadoop-namenode

  hive-metastore:
    build: ./hive
    container_name: hive-metastore
    restart: unless-stopped
    ports:
      - "9083:9083"
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: mysql
    volumes:
      - ./hive/hive-site.xml:/opt/hive/conf/hive-site.xml
    depends_on:
      mysql:
        condition: service_healthy
      hadoop-namenode:
        condition: service_started
      hadoop-datanode:
        condition: service_started

  hive-server:
    build: ./hive
    container_name: hive-server
    restart: unless-stopped
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      SERVICE_NAME: hiveserver2
      DB_DRIVER: mysql
      IS_RESUME: "true"
    volumes:
      - ./hive/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./init-hive.sql:/opt/init-hive.sql
      - ./doc:/data
    depends_on:
      hive-metastore:
        condition: service_started
      hadoop-namenode:
        condition: service_started
      hadoop-datanode:
        condition: service_started

  spark-master:
    build: ./spark
    container_name: spark-master
    restart: unless-stopped
    environment:
      - SPARK_MODE=master
    ports:
      - "8080:8080"      # Spark Master Web UI
      - "7077:7077"      # Spark Master Port
      - "4040:4040"      # Spark Application UI
      - "8888:8888"      # JupyterLab
    volumes:
      - ./spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./spark/hive-site.xml:/opt/spark/conf/hive-site.xml
      - ./jobs:/opt/spark/jobs
    depends_on:
      hive-metastore:
        condition: service_started
      hadoop-namenode:
        condition: service_started
      hadoop-datanode:
        condition: service_started

  spark-worker:
    build: ./spark
    container_name: spark-worker
    restart: unless-stopped
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
    ports:
      - "8081:8081"      # Spark Worker Web UI
    volumes:
      - ./spark/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./spark/hive-site.xml:/opt/spark/conf/hive-site.xml
      - ./jobs:/opt/spark/jobs
    depends_on:
      - spark-master

volumes:
  mysql_data:
  hadoop_namenode_data:
  hadoop_datanode_data:
