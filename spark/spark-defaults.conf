# Spark Configuration

# Master settings
spark.master                        spark://spark-master:7077

# Application settings
spark.app.name                      SparkHiveApp
spark.driver.memory                 1g
spark.executor.memory               1g

# Hive integration
spark.sql.warehouse.dir             hdfs://hadoop-namenode:8020/user/hive/warehouse
spark.sql.catalogImplementation     hive
spark.hadoop.hive.metastore.uris    thrift://hive-metastore:9083

# Hadoop/HDFS configuration
spark.hadoop.fs.defaultFS           hdfs://hadoop-namenode:8020

# Enable Hive support
spark.sql.hive.metastore.version    4.0.0
spark.sql.hive.metastore.jars       builtin

# Serialization
spark.serializer                    org.apache.spark.serializer.KryoSerializer

# Event logging (optional, for Spark History Server)
spark.eventLog.enabled              true
spark.eventLog.dir                  hdfs://hadoop-namenode:8020/spark-logs

# UI settings
spark.ui.port                       4040

# Network timeout settings
spark.network.timeout               600s
spark.sql.broadcastTimeout          600
